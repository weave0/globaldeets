    <style>
      /* Globe page overrides */
      html,
      body {
        height: 100%;
        overflow: hidden;
        margin: 0;
      }
      body {
        background: #000;
      }

      /* Full-screen globe */
      #globe-hero-container {
        position: fixed;
        inset: 0;
        z-index: 0;
        width: 100vw !important;
        height: 100vh !important;
      }
      #globe-hero-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      /* Transparent header overlay */
      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 30;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.72) 0%, transparent 100%) !important;
        -webkit-backdrop-filter: none !important;
        backdrop-filter: none !important;
        border-bottom: none !important;
        padding: 0.75rem 0 !important;
        transition: none !important;
      }

      header .tagline {
        font-size: 0.7rem;
      }
      header .site-logo-mark {
        height: 40px !important;
      }

      /* GFD ecosystem nav stays on top */
      .gfd-ecosystem-nav {
        z-index: 40;
      }

      /* Globe page-specific badge */
      .globe-page-badge {
        position: fixed;
        top: 5.5rem;
        right: 1.5rem;
        z-index: 30;
        background: rgba(5, 9, 17, 0.82);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 107, 53, 0.35);
        border-radius: 8px;
        padding: 0.4rem 0.9rem;
        font-size: 0.75rem;
        color: #ff6b35;
        font-weight: 600;
        letter-spacing: 0.04em;
        pointer-events: none;
      }

      .globe-page-badge .badge-live {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #ff6b35;
        border-radius: 50%;
        margin-right: 5px;
        vertical-align: middle;
        animation: badgePulse 1.4s ease-in-out infinite;
      }

      @keyframes badgePulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.75);
        }
      }

      /* Region filter bar */
      .globe-filter-bar {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 30;
        display: flex;
        gap: 0.4rem;
        background: rgba(5, 9, 17, 0.84);
        -webkit-backdrop-filter: blur(16px);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 50px;
        padding: 0.45rem 0.85rem;
        flex-wrap: wrap;
        justify-content: center;
        max-width: calc(100vw - 2rem);
      }

      .globe-filter-btn {
        background: none;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        color: rgba(255, 255, 255, 0.55);
        font-size: 0.75rem;
        padding: 0.3rem 0.85rem;
        cursor: pointer;
        transition: all 0.2s;
        font-family: 'Inter', sans-serif;
        white-space: nowrap;
        line-height: 1.5;
      }

      .globe-filter-btn:hover,
      .globe-filter-btn.active {
        background: rgba(0, 245, 255, 0.1);
        border-color: #00f5ff;
        color: #00f5ff;
      }

      /* News ticker bar at bottom */
      .news-ticker-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 25;
        height: 2rem;
      }

      /* News pin overlay */
      #news-pin-overlay {
        position: fixed;
        top: 50%;
        right: 2rem;
        transform: translateY(-50%) translateX(140%);
        z-index: 50;
        width: 320px;
        max-width: calc(100vw - 2rem);
        background: rgba(8, 12, 24, 0.94);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 245, 255, 0.18);
        border-radius: 16px;
        padding: 1.5rem;
        transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow:
          0 16px 48px rgba(0, 0, 0, 0.6),
          0 0 40px rgba(0, 245, 255, 0.06);
      }

      #news-pin-overlay.visible {
        transform: translateY(-50%) translateX(0);
      }

      #news-overlay-close {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.4);
        font-size: 1.3rem;
        cursor: pointer;
        line-height: 1;
        padding: 0.25rem;
        transition: color 0.2s;
      }

      #news-overlay-close:hover {
        color: #fff;
      }

      #news-overlay-source {
        font-size: 0.72rem;
        color: #ff6b35;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      #news-overlay-title {
        font-size: 1rem;
        font-weight: 600;
        color: #f0f4ff;
        line-height: 1.4;
        margin-bottom: 0.75rem;
      }

      #news-overlay-summary {
        font-size: 0.82rem;
        color: #94a3b8;
        line-height: 1.5;
        margin: 0 0 1rem;
      }

      #news-overlay-link {
        display: inline-block;
        font-size: 0.8rem;
        color: #00f5ff;
        text-decoration: none;
        border: 1px solid rgba(0, 245, 255, 0.25);
        border-radius: 6px;
        padding: 0.3rem 0.75rem;
        transition: all 0.2s;
      }

      #news-overlay-link:hover {
        background: rgba(0, 245, 255, 0.1);
        border-color: #00f5ff;
      }

      /* Accessibility: SR-only news list */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 600px) {
        #news-pin-overlay {
          top: auto;
          right: auto;
          bottom: 5.5rem;
          left: 1rem;
          right: 1rem;
          width: auto;
          transform: translateY(120%);
          transition: transform 0.35s ease;
        }
        #news-pin-overlay.visible {
          transform: translateY(0);
        }
        .globe-filter-bar {
          bottom: 4.5rem;
        }
      }
    </style>
  </head>

    <!-- Transparent header overlay -->

    <!-- Full-screen Globe -->
    <div
      id="globe-hero-container"
      role="img"
      aria-label="Interactive 3D globe showing global news locations. Use the news feed below for a text-accessible version."
    ></div>

    <!-- Live news count badge -->
    <div
      class="globe-page-badge"
      id="globe-news-badge"
      aria-live="polite"
      aria-label="Live news count"
    >
      <span class="badge-live" aria-hidden="true"></span>
      <span id="globe-news-count-text">Loading…</span>
    </div>

    <!-- News pin overlay (populated by globe-hero.js on pin click) -->
    <div id="news-pin-overlay" role="dialog" aria-modal="true" aria-label="News story detail">
      <button id="news-overlay-close" aria-label="Close story">&times;</button>
      <div id="news-overlay-source"></div>
      <div id="news-overlay-title"></div>
      <p id="news-overlay-summary"></p>
      <a id="news-overlay-link" target="_blank" rel="noopener noreferrer"></a>
    </div>

    <!-- Region filter buttons -->
    <div class="globe-filter-bar" role="group" aria-label="Filter news by region">
      <button class="globe-filter-btn active" data-region="global">All Regions</button>
      <button class="globe-filter-btn" data-region="americas">Americas</button>
      <button class="globe-filter-btn" data-region="europe">Europe</button>
      <button class="globe-filter-btn" data-region="middle-east">Middle East</button>
      <button class="globe-filter-btn" data-region="asia">Asia</button>
      <button class="globe-filter-btn" data-region="pacific">Pacific</button>
    </div>

    <!-- News ticker (bottom) -->
    <div class="news-ticker-bar" aria-label="News ticker">
      <span class="ticker-label">LIVE</span>
      <div class="ticker-viewport"><div id="ticker-track"></div></div>
    </div>

    <!-- Accessible news feed (screen readers) -->
    <section class="sr-only" aria-live="polite" id="news-feed-accessible">
      <h2>News Feed</h2>
      <p>Loading live news feed…</p>
    </section>

    <!-- Scripts -->
    <script src="shared/ecosystem-nav.js"></script>
    <script src="globe-hero.js"></script>
    <script>
      // Region filter wiring
      (function () {
        const buttons = document.querySelectorAll('.globe-filter-btn');
        const badge = document.getElementById('globe-news-count-text');
        let currentRegion = 'global';

        buttons.forEach(btn => {
          btn.addEventListener('click', function () {
            buttons.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentRegion = this.dataset.region;
            // Re-fetch with region filter
            if (typeof window._globeHeroFilterRegion === 'function') {
              window._globeHeroFilterRegion(currentRegion);
            }
          });
        });

        // Update badge when news loads
        document.addEventListener('globeNewsLoaded', function (e) {
          if (badge && e.detail) {
            badge.textContent = e.detail.count + ' live stories';
          }
        });
      })();
    </script>

    <!-- SW registration -->
    <script src="sw-register.js"></script>
