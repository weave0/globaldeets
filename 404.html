<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | GlobalDeets</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at 20% 20%, #1e3a8a22 0%, #0b1220 45%, #05070d 100%);
        color: #e5e7eb;
      }
      main {
        max-width: 680px;
        margin: 2rem;
        padding: 2rem;
        border: 1px solid #23304a;
        border-radius: 14px;
        background: #0f172a99;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.8rem, 2.8vw, 2.4rem);
      }
      p {
        margin: 0.75rem 0;
        line-height: 1.55;
        color: #cbd5e1;
      }
      a {
        display: inline-block;
        margin-top: 1.25rem;
        color: #67e8f9;
        text-decoration: none;
        border-bottom: 1px solid transparent;
      }
      a:hover,
      a:focus-visible {
        border-bottom-color: currentColor;
        outline: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found</h1>
      <p>The page you requested does not exist or has moved.</p>
      <p>Please return to the homepage and continue from there.</p>
      <a href="/">Go to GlobalDeets homepage</a>
    </main>
  </body>
</html>
