name: Deploy to Cloudflare Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: pages-deploy-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install dependencies
              run: npm install

            - name: Install Playwright Chromium
              run: npx playwright install chromium

            - name: Validate before deploy
              run: |
                  npm run lint
                  npm run test:smoke

            - name: Stage clean deploy artifact
              run: npm run stage:deploy
              env:
                  NODE_ENV: production
                  CF_PAGES_BRANCH: main
                  CF_PAGES_COMMIT_SHA: ${{ github.sha }}

            - name: Deploy to Cloudflare Pages
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy dist --project-name globaldeets --branch main --commit-hash ${{ github.sha }} --commit-dirty=false

            - name: Post-deploy health probe
              run: npm run health:prod -- --skip-active-copy
