name: Deploy to Cloudflare Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: pages-deploy-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write
        steps:
            - uses: actions/checkout@v4

            - name: Deploy to Cloudflare Pages
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy . --project-name globaldeets --branch main

            - name: Post-deploy health probe
              run: |
                  sleep 10
                  STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://globaldeets.com/)
                  echo "Home page HTTP status: $STATUS"
                  if [ "$STATUS" != "200" ]; then
                    echo "::warning::Home returned $STATUS — deployment may still be propagating"
                  fi
