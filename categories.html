<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Platform Categories - GlobalDeets</title>
    <meta name="description" content="Browse GlobalDeets platforms grouped by category" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="auth.js"></script>
    <style>
      .category-hero {
        text-align: center;
        padding: 4rem 2rem 3rem;
        background: var(--glass);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        margin-bottom: 3rem;
      }

      .category-hero h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        background: linear-gradient(
          135deg,
          #60a5fa 0%,
          #8b5cf6 25%,
          #ec4899 50%,
          #f59e0b 75%,
          #10b981 100%
        );
        background-size: 300% 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gradientShift 10s ease infinite;
      }

      .category-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
        margin-bottom: 4rem;
      }

      .category-card {
        background: var(--glass);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        backdrop-filter: blur(24px) saturate(180%);
        border-radius: 24px;
        padding: 2rem;
        border: 1px solid var(--glass-border);
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }

      .category-card:hover {
        transform: translateY(-12px) scale(1.02);
        border-color: rgba(59, 130, 246, 0.6);
        box-shadow:
          0 32px 80px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(59, 130, 246, 0.4),
          var(--glow-primary);
      }

      .category-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      .category-name {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--text-primary);
      }

      .category-count {
        color: var(--text-secondary);
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }

      .category-description {
        color: var(--text-secondary);
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }

      .category-projects-list {
        list-style: none;
        padding: 0;
      }

      .category-projects-list li {
        padding: 0.5rem 0;
        color: var(--text-primary);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .category-projects-list li:last-child {
        border-bottom: none;
      }

      .category-projects-list a {
        color: var(--primary-light);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      }

      .category-projects-list a:hover {
        color: var(--accent);
      }
    </style>
    <!-- Skip link styles now centralized in styles.css -->
  </head>

  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <!-- Glass Header -->
    <header>

        <div class="header">

            <h1>GlobalDeets</h1>
            <p class="tagline">Data Platform Showcase • Strategic Insights • Live Analytics</p>
          </div>
          <nav role="navigation" aria-label="Primary navigation" class="primary-nav">
            <a href="index.html" class="nav-icon-btn" title="Home"
              ><img
                src="assets/icons/site/nav-home.png"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
            /></a>
            <a href="globe.html" class="nav-icon-btn" title="Globe — Live Earth"
              ><img
                src="assets/icons/site/nav-globe.png"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
            /></a>
            <a href="news.html" class="nav-icon-btn" title="World News"
              ><img
                src="assets/icons/site/nav-news.png"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
            /></a>
            <a href="spheres.html" class="nav-icon-btn" title="Ecosystem Spheres"
              ><img
                src="assets/icons/site/nav-compass.png"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
            /></a>
            <a href="knowledge.html" class="nav-icon-btn" title="Knowledge Sources"
              ><img
                src="assets/icons/site/nav-list.png"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
            /></a>
            <a href="worldmap.html" class="nav-icon-btn" title="Live Webcams"
              ><img
                src="assets/icons/site/nav-map-pin.png"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
            /></a>
            <a href="about.html" class="nav-icon-btn" title="About GlobalDeets"
              ><img
                src="assets/icons/site/nav-info.png"
                alt=""
                aria-hidden="true"
                width="32"
                height="32"
            /></a>
          </nav>
        </div>
      </div>
    </header>

    <main id="main-content">
      <div class="container" role="region" aria-label="Categories listing">
        <div class="category-hero">
          <h1>Project Categories</h1>
          <p>Explore our projects organized by purpose and domain</p>
        </div>

        <div class="category-grid" id="categories-container">
          <!-- Categories will be dynamically generated here -->
        </div>

        <footer class="footer">
          <p>© 2026 GlobalDeets · Data Platform Showcase</p>
          <div class="footer-links">
            <button id="themeToggle" type="button" aria-label="Toggle theme" class="view-details">
              Theme
            </button>
            <a href="index.html" class="view-details" aria-label="Home">Home</a>
            <a href="analytics.html" class="view-details" aria-label="Analytics">Analytics</a>
            <a href="timeline.html" class="view-details" aria-label="Timeline">Timeline</a>
          </div>
        </footer>
      </div>
    </main>

    <button id="scrollToTop" class="scroll-to-top" aria-label="Scroll to top">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="12" y1="19" x2="12" y2="5" />
        <polyline points="5 12 12 5 19 12" />
      </svg>
    </button>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="projects-data.js"></script>
    <script src="ui-effects.js"></script>
    <script src="interactions.js"></script>
    <script src="sw-register.js"></script>
    <script>
      // Category definitions
      const categoryInfo = {
        Business: {
          icon: '💼',
          description:
            'Strategic intelligence, analytics platforms, and business development tools powering data-driven decisions.',
        },
        Creative: {
          icon: '🎨',
          description:
            'Storytelling, artistic tributes, and interactive experiences that inspire and engage.',
        },
        Experimental: {
          icon: '🔬',
          description:
            'Cutting-edge research, AI exploration, and innovative prototypes pushing boundaries.',
        },
        Development: {
          icon: '⚡',
          description:
            'Developer tools, APIs, and technical infrastructure supporting modern applications.',
        },
      };

      // Generate categories
      function renderCategories() {
        const categoriesContainer = document.getElementById('categories-container');
        const categoryGroups = {};

        // Group projects by category
        projects.forEach(project => {
          if (!categoryGroups[project.category]) {
            categoryGroups[project.category] = [];
          }
          categoryGroups[project.category].push(project);
        });

        // Create category cards
        Object.keys(categoryGroups)
          .sort()
          .forEach(category => {
            const projectsInCategory = categoryGroups[category];
            const info = categoryInfo[category] || { icon: '📁', description: 'Various projects' };

            const card = document.createElement('div');
            card.className = 'category-card';
            card.innerHTML = `
                    <div class="category-icon">${info.icon}</div>
                    <h2 class="category-name">${category}</h2>
                    <p class="category-count">${projectsInCategory.length} project${projectsInCategory.length !== 1 ? 's' : ''}</p>
                    <p class="category-description">${info.description}</p>
                    <ul class="category-projects-list">
                        ${projectsInCategory
                          .map(
                            p => `
                            <li><a href="${p.url}" target="_blank" rel="noopener">${p.name}</a></li>
                        `
                          )
                          .join('')}
                    </ul>
                `;
            categoriesContainer.appendChild(card);
          });
      }

      renderCategories();
      if (window.initUiEffects) window.initUiEffects();
    </script>
  </body>
</html>
